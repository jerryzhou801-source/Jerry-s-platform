<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>价格 · 研究笔记</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/style.css" />
  <script src="assets/i18n.js"></script>
  <script src="assets/chart.js"></script>
</head>
<body data-i18n-title="title_prices">
  <header class="masthead">
    <div class="mh-inner">
      <div class="mh-name" data-i18n="site_name">研究笔记</div>
      <div class="mh-tag" data-i18n="tagline">油籽 · 植物油 · 生物柴油</div>
    </div>
  </header>
  <nav class="sitenav">
        <a href="index.html" data-i18n="nav_home">首页</a>
        <a href="reports.html" data-i18n="nav_reports">报告</a>
        <a href="prices.html" class="active" data-i18n="nav_prices">价格</a>
        <a href="trades.html" data-i18n="nav_trades">交易日志</a>
        <a href="about.html" data-i18n="nav_about">关于我</a>
        <button id="langToggle" class="lang-toggle" aria-label="Switch language">EN</button>
  </nav>

  <main class="wrap">
    <div class="section-head">
      <h1 data-i18n="prices_title">价格走势</h1>
      <p data-i18n-html="prices_sub_html">各品种价格折线图 · 手动维护。涨为<span style="color:var(--up);font-weight:700">红</span>、跌为<span style="color:var(--down);font-weight:700">绿</span>。</p>
      <div class="rule"></div>
    </div>
    <p class="price-disclaimer" data-i18n="price_disclaimer">说明:本页价格均由本人从市场公开渠道收集整理,仅供参考、观察趋势之用,不代表市场公允价或可成交价格,请勿据此交易或作为决策依据。</p>
    <div id="updated" class="price-updated"></div>
    <div id="content"></div>
    <div id="err" class="empty hidden"></div>
  </main>

  <footer class="foot">© <span id="year"></span> <span data-i18n="site_name">研究笔记</span> · <span data-i18n="foot">内容仅供个人研究记录,不构成投资建议。</span></footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function LANG() { return window.i18n ? i18n.getLang() : 'zh'; }
    function T(key, zh) { return window.i18n ? i18n.t(key) : zh; }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function nameOf(x) { return (x && typeof x === 'object') ? (x[LANG()] || x.zh || x.en || '') : (x || ''); }
    function fmt(n) { var v = Math.abs(Number(n)); return (v >= 100 || Number.isInteger(v)) ? v.toLocaleString('en-US') : v.toFixed(2); }

    // 计算某序列当天的涨跌
    function change(hist) {
      var h = (hist || []).slice().sort(function (a, b) { return String(a['日期']) < String(b['日期']) ? -1 : 1; });
      var last = h[h.length - 1], prev = h[h.length - 2];
      if (!last) return { have: false, lastD: '' };
      var out = { have: true, lastD: String(last['日期']), sorted: h };
      if (prev) {
        var diff = Number(last['数值']) - Number(prev['数值']);
        out.diff = diff;
        out.cls = diff > 0.0000001 ? 'up' : (diff < -0.0000001 ? 'down' : 'flat');
        out.arrow = out.cls === 'up' ? '▲' : (out.cls === 'down' ? '▼' : '');
      } else { out.cls = 'flat'; out.arrow = ''; out.diff = 0; }
      return out;
    }
    function chgText(c, unit) {
      if (c.cls === 'flat') return '<span class="pc-chg flat">' + T('price_flat', '持平') + '</span>';
      return '<span class="pc-chg ' + c.cls + '">' + c.arrow + ' ' + fmt(c.diff) + (unit ? ' ' + esc(unit) : '') + '</span>';
    }

    function panelCard(panel) {
      var series = panel['序列'] || (panel['历史'] ? [{ '名称': panel['名称'], '历史': panel['历史'] }] : []);
      var name = esc(nameOf(panel['名称']));
      var unit = panel['单位'] || '';
      var head = '<div class="pc-top"><span class="pc-name">' + name + '</span>' +
        (unit ? '<span class="pc-unit">' + esc(unit) + '</span>' : '') + '</div>';

      if (series.length === 1) {
        var c = change(series[0]['历史']);
        return '<div class="price-card">' + head + priceChartSVG(c.sorted || series[0]['历史']) +
          '<div class="pc-foot">' + chgText(c, unit) +
          '<span class="pc-date">' + T('price_updated_on', '更新于 ') + (c.lastD || '—') + '</span></div></div>';
      }

      // 多序列(远期曲线):叠加折线 + 每条的当天涨跌
      var pal = window.CHART_PALETTE || ['#5c6a3d', '#b0472f', '#c8a67f', '#6d7a80', '#82705c'];
      var lastD = '';
      var legend = '<div class="pc-legend">' + series.map(function (s, i) {
        var c = change(s['历史']);
        if (c.lastD > lastD) lastD = c.lastD;
        var cc = c.have && c.cls !== 'flat'
          ? '<b class="' + c.cls + '">' + c.arrow + fmt(c.diff) + '</b>'
          : '<b class="flat">·</b>';
        return '<span class="pc-leg"><i style="background:' + pal[i % pal.length] + '"></i>' + esc(nameOf(s['名称'])) + ' ' + cc + '</span>';
      }).join('') + '</div>';
      return '<div class="price-card">' + head + multiChartSVG(series) + legend +
        '<div class="pc-foot"><span></span><span class="pc-date">' + T('price_updated_on', '更新于 ') + (lastD || '—') + (unit ? ' · ' + esc(unit) : '') + '</span></div></div>';
    }

    var priceData = null;
    function render() {
      if (!priceData) return;
      var content = document.getElementById('content');
      var groups = priceData['分组'];
      var latest = priceData['更新时间'] || '';
      var html = '', count = 0;

      if (groups && groups.length) {
        groups.forEach(function (g) {
          html += '<h2 class="price-section">' + esc(nameOf(g['组名'])) + '</h2><div class="price-grid">';
          (g['面板'] || []).forEach(function (p) { html += panelCard(p); count++; });
          html += '</div>';
        });
      } else {
        var items = priceData['品种'] || [];
        html += '<div class="price-grid">';
        items.forEach(function (p) { html += panelCard(p); count++; });
        html += '</div>';
      }
      content.innerHTML = html;
      document.getElementById('updated').textContent = count ? (T('price_updated_on', '更新于 ') + latest) : '';
      var e = document.getElementById('err');
      if (!count) { e.textContent = T('price_none', 'prices.json 里还没有任何品种。'); e.classList.remove('hidden'); }
      else { e.classList.add('hidden'); }
    }

    fetch('data/prices.json?t=' + Date.now())
      .then(function (r) { if (!r.ok) throw new Error('读取 prices.json 失败'); return r.json(); })
      .then(function (data) { priceData = data; render(); })
      .catch(function (err) {
        var e = document.getElementById('err');
        e.textContent = '加载价格数据出错:' + err.message; e.classList.remove('hidden');
      });

    document.addEventListener('langchange', render);
  </script>
</body>
</html>
