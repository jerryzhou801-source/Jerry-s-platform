# ============================================================
#  网页后台配置(决定后台里有哪些栏目、表单长什么样)
#  上线时,你只需要改下面这一行的 repo(改成你自己的 GitHub 用户名/仓库名)。
#  其余都不用动。
# ============================================================

backend:
  name: github
  repo: jerryzhou801-source/Jerry-s-platform   # 你的仓库(已填好)
  branch: main
  base_url: https://jerry-s-platform.pages.dev   # 后台登录走 Cloudflare(Pages Functions)
  auth_endpoint: auth

# 后台界面语言 = 简体中文
locale: zh_Hans

# 上传的图片放哪里
media_folder: assets/uploads
public_folder: /assets/uploads

# 让改动直接发布(点“发布”即上线,不需要审稿流程)
publish_mode: simple

collections:
  # -------- 报告(每日简报 / 周报)--------
  - name: reports
    label: 报告
    label_singular: 报告
    folder: reports
    create: true
    extension: md
    format: frontmatter
    slug: '{{fields.date}}-{{fields.lang}}-report'
    summary: '{{fields.date}} · {{title}}'
    sortable_fields: [date, title]
    fields:
      - { label: 语言, name: lang, widget: select, options: [{ label: 中文, value: zh }, { label: English, value: en }], default: zh, hint: '这篇是中文还是英文?会显示在对应语言的网站里' }
      - { label: 标题, name: title, widget: string, hint: '例如:每日简报 · 2026-07-03' }
      - { label: 日期, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD' }
      - { label: 摘要(可选,显示在列表里), name: summary, widget: text, required: false }
      - { label: 正文, name: body, widget: markdown }

  # -------- 交易日志 --------
  - name: trades
    label: 交易日志
    label_singular: 交易日志
    folder: trades
    create: true
    extension: md
    format: frontmatter
    slug: '{{fields.date}}-{{fields.lang}}-trade'
    summary: '{{fields.date}} · {{title}}'
    sortable_fields: [date, title]
    fields:
      - { label: 语言, name: lang, widget: select, options: [{ label: 中文, value: zh }, { label: English, value: en }], default: zh, hint: '这篇是中文还是英文?会显示在对应语言的网站里' }
      - { label: 标题, name: title, widget: string, hint: '例如:交易日志 · 2026-07-02 菜油/棕榈价差' }
      - { label: 日期, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD' }
      - { label: 摘要(可选), name: summary, widget: text, required: false }
      - { label: 正文, name: body, widget: markdown }

  # 注:价格数据(data/prices.json)由本地导出工具生成(tools/export_prices.py),
  #     不在后台编辑,以免被下次导出覆盖。

  # -------- 关于我(编辑 about.md)--------
  - name: pages
    label: 页面
    files:
      - name: about
        label: 关于我(中文)
        file: about.md
        fields:
          - { label: 标题, name: title, widget: string, required: false }
          - { label: 正文, name: body, widget: markdown, hint: '正文里也能插入图片(工具条的图片按钮)' }
      - name: about_en
        label: About (English)
        file: about.en.md
        fields:
          - { label: Title, name: title, widget: string, required: false }
          - { label: Body, name: body, widget: markdown, hint: 'Shown when the site is switched to English.' }
